<mat-toolbar color="primary" class="main-toolbar">
  <div class="nav-container">
    <div class="brand" routerLink="/">
      <mat-icon>movie</mat-icon>
      <span>MOVIE SHELF</span>
    </div>
    <span class="spacer"></span>
    <div class="nav-links">
      <button mat-button routerLink="/" routerLinkActive="active"
        [routerLinkActiveOptions]="{exact: true}">HOME</button>

      <!-- Theme Toggle Button -->
      <button mat-icon-button (click)="toggleTheme()" matTooltip="Toggle Light/Dark Mode">
        <mat-icon>{{ (isDarkMode$ | async) ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button mat-button routerLink="/favorites" routerLinkActive="active">
        <mat-icon [matBadge]="favoritesCount$ | async" matBadgeColor="accent"
          [matBadgeHidden]="(favoritesCount$ | async) === 0">favorite</mat-icon>
        <span>FAVORITES</span>
      </button>
    </div>
  </div>
</mat-toolbar>

<main>
  <div class="page-transition-container" *ngIf="{ isDark: isDarkMode$ | async } as theme">
    <router-outlet></router-outlet>
  </div>
</main>
