<mat-card class="movie-card" [routerLink]="['/movie', movie.id]">
  <img
    mat-card-image
    [src]="movie.image?.medium || 'https://via.placeholder.com/210x295?text=No+Image'"
    [alt]="movie.name"
    class="card-image"
  />

  <mat-card-header>
    <mat-card-title>{{ movie.name }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="rating" *ngIf="movie.rating.average">
      <mat-icon>star</mat-icon>
      <span>{{ movie.rating.average }}</span>
    </div>

    <div class="genres-list">
      <mat-chip *ngFor="let genre of movie.genres | slice: 0 : 3">{{ genre }}</mat-chip>
    </div>
  </mat-card-content>

  <mat-card-actions>
    <button mat-button color="primary" [routerLink]="['/movie', movie.id]">DETAILS</button>
    <button
      mat-icon-button
      class="favorite-btn"
      [class.is-favorite]="isFavorite"
      (click)="onToggleFavorite($event)"
    >
      <mat-icon>{{ isFavorite ? 'favorite' : 'favorite_border' }}</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
